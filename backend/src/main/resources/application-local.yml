spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/instagram
    username: ${POSTGRES_USER:instagram}
    password: ${POSTGRES_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

logging:
  level:
    com.instagram: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

app:
  storage:
    minio:
      endpoint: ${MINIO_URL:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:admin}
      secret-key: ${MINIO_SECRET_KEY:password}
      bucket: ${MINIO_BUCKET:instagram-media}

  cors:
    allowed-origins: http://localhost:5173